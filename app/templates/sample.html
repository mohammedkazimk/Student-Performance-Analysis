<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .leaderboard-container {
  max-width: 950px;
  margin: 40px auto;
  background: linear-gradient(135deg, #f9f9f9, #eef2f7);
  border-radius: 20px;
  padding: 5px 30px 30px 30px;
  box-shadow: 0 12px 35px rgba(0,0,0,0.1);
}

.leaderboard-title {
  text-align: center;
  font-size: 37px;
  font-weight: 800;
  color: #2c3e50;
  margin-bottom: 25px;
  letter-spacing: 1px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.leaderboard-table {
  width: 100%;
  border-collapse: collapse;
  overflow: hidden;
  border-radius: 15px;
}

.leaderboard-table thead {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  font-size: 21px;
}

.leaderboard-table th,
.leaderboard-table td {
  padding: 18px 22px;
  text-align: center;
  font-size: 20px;
}

.leaderboard-table tbody tr {
  background: #ffffff;
  transition: all 0.3s ease;
}

.leaderboard-table tbody tr:nth-child(even) {
  background: #f4f7fb;
}

.leaderboard-table tbody tr:hover {
  background: #eaf0ff;
  transform: scale(1.01);
  box-shadow: 0 5px 15px rgba(0,0,0,0.06);
}

.leaderboard-table tbody td {
  color: #34495e;
}

.leaderboard-table tbody td:first-child {
  font-weight: bold;
  color: #4a47a3;
}

/* Highlight active student */
.active-student {
  background: #fff6e5 !important;
  border-left: 6px solid #f39c12;
  font-weight: bold;
  box-shadow: 0 4px 15px rgba(243, 156, 18, 0.2);
}
</style>
</head>
<body>
  <div class="leaderboard-container">
  <h2 class="leaderboard-title">🏆 Student Leaderboard</h2>
  <table class="leaderboard-table">
    <thead>
      <tr>
        <th>Rank</th>
        <th>Name</th>
        <th>Percentage</th>
        <th>CGPA</th>
      </tr>
    </thead>
    <tbody>
      <tr >
        <td>1</td>
        <td>Mohammed Ali</td>
        <td>96%</td>
        <td>9.8</td>
      </tr>
      <tr>
        <td>2</td>
        <td>Priya Sharma</td>
        <td>94%</td>
        <td>9.6</td>
      </tr>
      <tr>
        <td>3</td>
        <td>Arjun Mehta</td>
        <td>92%</td>
        <td>9.4</td>
      </tr>
      <tr>
        <td>4</td>
        <td>Ananya Rao</td>
        <td>90%</td>
        <td>9.2</td>
      </tr>
      <tr class="active-student">
        <td >4</td>
        <td>Ananya Rao</td>
        <td>90%</td>
        <td>9.2</td>
      </tr>
      <tr>
        <td>4</td>
        <td>Ananya Rao</td>
        <td>90%</td>
        <td>9.2</td>
      </tr>
    </tbody>
  </table>
</div>
</body>
</html>
