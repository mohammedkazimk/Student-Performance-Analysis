{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff-Login</title>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"></script>
  <link href="https://cdn.jsdelivr.net/npm/fastbootstrap@2.2.0/dist/css/fastbootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="{% static 'style.css' %}">
  <script type="module" src="script/google.js" defer></script>
  <script type="module" src="script/login.js" defer>
  </script>
  <link rel="icon" type="image/jpg" href="{% static 'photos/College_Logo.jpg' %}">
</head>

<body>
  {% if error %}
  <div class="alert alert-danger alert-dismissible fade show" role="alert" id="myAlert">
    Invalid username or password!
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
  {% endif %}
  <!--login form-->
  <section class="login-form my-4">
    <div class="container">
      <div class="row justify-content-center align-items-center">
        <div class="col-md-4 mb-4 mb-md-0">
          <div class="form-container">
            <h2 class="text-center mb-4">Staff Log in</h2>
            <form method="POST">
              {% csrf_token %}
              <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" name="username" class="form-control" id="email" aria-describedby="emailHelp"
                  autocomplete="email" required placeholder="abcd@mucollege.ac.in">
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" name="password" class="form-control" id="password" placeholder="DD-MM-YYYY">
              </div>
              <button type="submit" class="btn btn-primary w-100 mb-1" id="login">Log in</button>
            </form>
          </div>
        </div>
        <div class="col-md-7">
          <img src="{% static 'photos/Login.png' %}" alt="Let's Progress" class="img-fluid image my-2">
        </div>
      </div>
    </div>
  </section>


  <!--footer-->
  <div class="container">
    <footer class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top">
      <div class="col-md-4 d-flex align-items-center">
        <span class="mb-3 mb-md-0 text-body-secondary">Copyright &copy; <span id="currentYear"></span> Let's Progress.
          All rights reserved.</span>
      </div>

    </footer>

    <script>
      // JavaScript to display the current year in the footer
      document.getElementById('currentYear').textContent = new Date().getFullYear();

      setTimeout(function () {
        let messages = document.querySelectorAll('.alert');
        messages.forEach(function (message) {
          message.style.display = 'none';
        });
      }, 4000);
    </script>

  </div>

</body>



</html>
