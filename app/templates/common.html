{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpg" href="{% static 'photos/College_Logo.jpg' %}">
    <title>{{title}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f3f6fb;
            margin: 0;
            padding: 0;
        }

        nav {
            width: 100%;
            background: #fff;
            /* White background */
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px;
            position: relative;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            /* subtle shadow */
        }

        /* Logo + Company */
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand img {
            height: 45px;
            width: auto;
        }

        .brand span {
            font-size: 1.3rem;
            font-weight: bold;
            color: black;
            letter-spacing: 0.5px;
        }

        .brand #blue {
            color: #096afc;
        }

        /* Nav links */
        .nav-links {
            display: flex;
            align-items: center;
            list-style: none;
        }

        .nav-links li {
            margin-left: 25px;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-size: 1rem;
            transition: 0.3s;
            padding: 6px 10px;
            border-radius: 6px;
        }

        .nav-links a:hover {
            background: #f2f2f2;
            color: #007bff;
        }

        /* Profile */
        .profile {
            display: flex;
            align-items: center;
            margin-left: 25px;
            transition: 0.3s;
            color: #333;
            font-weight: 500;
        }

        .profile i {
            font-size: 1.5rem;
            margin-right: 8px;
        }

        .logout-btn {
            color: #666;
            font-size: 0.95rem;
            font-weight: normal;
            opacity: 0.8;
            border: 1px solid #ddd;
            padding: 5px 12px;
            border-radius: 5px;
            margin-left: 20px;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #f9f9f9;
            color: #444;
            opacity: 1;
        }


        /* Hamburger */
        .menu-toggle {
            display: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #333;
        }

        /* Active tab */
        .nav-links a.active {
            color: #007bff;
            font-weight: 600;
            border-bottom: 2px solid #007bff;
            background: #f2f2f2;
        }


        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 65px;
                right: 0;
                background: #fff;
                flex-direction: column;
                width: 220px;
                padding: 15px;
                border-radius: 8px;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links li {
                margin: 15px 0;
            }

            .menu-toggle {
                display: block;
            }
        }
    </style>
    {% block style %}

    {% endblock style %}
</head>

<body>
    {% block body %}

    {% endblock body %}
</body>

</html>
